name: evidence
on: [push, pull_request]
jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python3 slop_demo/slop_discrimination.py
      - run: python3 slop_demo/test_demo.py
